name: CI

on:
  push:
    branches: [main, 'feature/**', 'feat/**', 'fix/**']
    paths:
      - 'minesweeper/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'minesweeper/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kata-tests .

      - name: Run tests inside container
        run: docker run --rm kata-tests
